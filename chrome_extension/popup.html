<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
body {
  width: 380px;
  padding: 20px;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  font-size: 14px;
  color: #333;
}
h2 { margin: 0 0 8px; font-size: 16px; }
p { margin: 8px 0; line-height: 1.5; }
.status {
  padding: 12px;
  border-radius: 8px;
  margin: 12px 0;
  word-break: break-all;
}
.status.info { background: #e3f2fd; color: #1565c0; }
.status.success { background: #e8f5e9; color: #2e7d32; }
.status.error { background: #fbe9e7; color: #c62828; }
.output-area {
  margin-top: 12px;
}
.output-area label {
  display: block;
  font-weight: 500;
  font-size: 13px;
  margin-bottom: 4px;
}
.output-area textarea {
  width: 100%;
  height: 80px;
  padding: 8px;
  border: 1px solid #ccc;
  border-radius: 4px;
  box-sizing: border-box;
  font-family: monospace;
  font-size: 12px;
  resize: vertical;
}
button {
  margin-top: 12px;
  width: 100%;
  padding: 10px;
  background: #1976d2;
  color: white;
  border: none;
  border-radius: 6px;
  font-size: 14px;
  cursor: pointer;
}
button:hover { background: #1565c0; }
button:disabled { background: #bbb; cursor: not-allowed; }
button.copy-btn {
  background: #43a047;
  margin-top: 8px;
}
button.copy-btn:hover { background: #388e3c; }
ol {
  padding-left: 20px;
  margin: 8px 0;
}
li { margin: 4px 0; line-height: 1.4; }
</style>
</head>
<body>
  <h2>Nest Protect Auth Helper</h2>
  <p>Extract cookies needed for the <strong>ha-nest-protect</strong> Home Assistant integration.</p>

  <ol>
    <li>Sign in to <a href="https://home.nest.com" target="_blank">home.nest.com</a></li>
    <li>Click the button below to extract cookies</li>
    <li>Copy the result into your Home Assistant configuration</li>
  </ol>

  <button id="extract_btn">Extract Cookies</button>

  <div id="status_area"></div>
  <div id="output_area" class="output-area" style="display:none;">
    <label for="issue_token">Issue Token URL</label>
    <textarea id="issue_token" readonly></textarea>
    <label for="cookies" style="margin-top:8px;">Cookies</label>
    <textarea id="cookies" readonly></textarea>
    <button id="copy_btn" class="copy-btn">Copy to Clipboard</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
